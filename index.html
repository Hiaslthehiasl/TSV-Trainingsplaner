<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TSV 1862 Friedberg · Trainingsplan</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Oswald:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --pitch: #1a7a3c; --pitch-light: #22a050; --pitch-dim: #0f4d25;
    --slate: #1c1f26; --slate-mid: #2a2f3a; --slate-soft: #363c4a;
    --mist: #f0f2f5; --mist-dark: #dde1e8;
    --text: #1c1f26; --text-soft: #6b7280; --white: #ffffff; --accent: #e8f5ec;
    --block-aufwaermen: #f59e0b; --block-spielen1: #3b82f6;
    --block-ueben: #8b5cf6; --block-spielen2: #10b981; --block-pause: #9ca3af;
    --radius: 10px; --radius-sm: 6px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Inter', sans-serif; background: var(--mist); color: var(--text); min-height: 100vh; }

  /* HEADER */
  .app-header { background: var(--slate); color: var(--white); padding: 0 16px; display: flex; align-items: center; justify-content: space-between; height: 56px; position: sticky; top: 0; z-index: 100; }
  .app-logo { font-family: 'Oswald', sans-serif; font-size: 17px; font-weight: 700; letter-spacing: .03em; display: flex; align-items: center; gap: 8px; }
  .logo-dot { width: 8px; height: 8px; background: var(--pitch-light); border-radius: 50%; }
  .btn-icon { background: var(--slate-soft); border: none; color: var(--white); width: 36px; height: 36px; border-radius: var(--radius-sm); cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; transition: background .15s; }
  .btn-icon:hover { background: var(--pitch-dim); }

  /* LAYOUT */
  .app-body { max-width: 900px; margin: 0 auto; padding: 16px; }
  #view-list, #view-plan, #view-stats, #view-library { display: none; }
  #view-list.active, #view-plan.active, #view-stats.active, #view-library.active { display: block; }

  /* NAV */
  .nav-tabs { display: flex; background: var(--white); border-radius: var(--radius); padding: 4px; gap: 2px; margin-bottom: 16px; box-shadow: 0 1px 3px rgba(0,0,0,.08); }
  .nav-tab { flex: 1; background: none; border: none; padding: 8px 4px; font-family: 'Inter',sans-serif; font-size: 12px; font-weight: 500; color: var(--text-soft); cursor: pointer; border-radius: var(--radius-sm); transition: all .15s; display: flex; flex-direction: column; align-items: center; gap: 2px; }
  .nav-tab .tab-icon { font-size: 16px; }
  .nav-tab.active { background: var(--slate); color: var(--white); }

  /* BUTTONS */
  .btn-primary { background: var(--pitch); color: var(--white); border: none; padding: 8px 16px; border-radius: var(--radius-sm); font-family: 'Inter',sans-serif; font-size: 13px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 6px; transition: background .15s; }
  .btn-primary:hover { background: var(--pitch-dim); }
  .btn-secondary { background: var(--white); color: var(--text); border: 1px solid var(--mist-dark); padding: 8px 16px; border-radius: var(--radius-sm); font-family: 'Inter',sans-serif; font-size: 13px; font-weight: 500; cursor: pointer; transition: all .15s; }
  .btn-secondary:hover { border-color: var(--pitch); color: var(--pitch); }

  /* SECTION */
  .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
  .section-title { font-family: 'Oswald',sans-serif; font-size: 20px; font-weight: 600; color: var(--slate); text-transform: uppercase; letter-spacing: .04em; }

  /* SESSION CARDS */
  .session-card { background: var(--white); border-radius: var(--radius); padding: 16px; margin-bottom: 10px; cursor: pointer; box-shadow: 0 1px 3px rgba(0,0,0,.06); transition: box-shadow .15s, transform .1s; border-left: 4px solid var(--pitch); display: flex; justify-content: space-between; align-items: center; }
  .session-card:hover { box-shadow: 0 4px 12px rgba(0,0,0,.1); transform: translateY(-1px); }
  .session-date { font-family: 'Oswald',sans-serif; font-size: 18px; font-weight: 600; color: var(--slate); }
  .session-meta { font-size: 12px; color: var(--text-soft); margin-top: 4px; display: flex; gap: 12px; flex-wrap: wrap; }
  .session-chips { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 8px; }
  .chip { font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 20px; text-transform: uppercase; letter-spacing: .04em; }
  .chip-aufwaermen { background: #fef3c7; color: #92400e; }
  .chip-spielen { background: #dbeafe; color: #1e40af; }
  .chip-ueben { background: #ede9fe; color: #5b21b6; }
  .session-arrow { color: var(--text-soft); font-size: 18px; }
  .empty-state { text-align: center; padding: 48px 24px; color: var(--text-soft); }
  .empty-state .empty-icon { font-size: 48px; margin-bottom: 12px; }
  .empty-state h3 { font-size: 16px; font-weight: 600; color: var(--text); margin-bottom: 8px; }

  /* PLAN VIEW */
  .plan-back { display: flex; align-items: center; gap: 8px; background: none; border: none; font-family: 'Inter',sans-serif; font-size: 14px; font-weight: 500; color: var(--text-soft); cursor: pointer; margin-bottom: 16px; padding: 4px 0; }
  .plan-back:hover { color: var(--pitch); }
  .plan-hero { background: var(--slate); color: var(--white); border-radius: var(--radius); padding: 20px; margin-bottom: 16px; display: flex; justify-content: space-between; align-items: flex-start; flex-wrap: wrap; gap: 12px; }
  .plan-date { font-family: 'Oswald',sans-serif; font-size: 28px; font-weight: 700; }
  .plan-team { font-size: 13px; color: rgba(255,255,255,.6); margin-top: 4px; text-transform: uppercase; letter-spacing: .06em; }
  .plan-stats { display: flex; gap: 20px; text-align: right; }
  .plan-stat-val { font-family: 'Oswald',sans-serif; font-size: 22px; font-weight: 600; color: var(--pitch-light); }
  .plan-stat-lbl { font-size: 11px; color: rgba(255,255,255,.5); text-transform: uppercase; letter-spacing: .05em; }
  .plan-note { background: var(--accent); border-left: 3px solid var(--pitch); border-radius: 0 var(--radius-sm) var(--radius-sm) 0; padding: 10px 14px; font-size: 13px; color: var(--pitch-dim); margin-bottom: 16px; }

  /* FIELD SETUP */
  .field-setup { background: var(--white); border-radius: var(--radius); padding: 16px; margin-bottom: 16px; box-shadow: 0 1px 3px rgba(0,0,0,.06); }
  .field-setup-title { font-family: 'Oswald',sans-serif; font-size: 13px; font-weight: 600; color: var(--text-soft); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 10px; }
  .fields-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(110px, 1fr)); gap: 8px; }
  .field-box { background: var(--mist); border-radius: var(--radius-sm); padding: 10px; text-align: center; }
  .field-box-label { font-size: 10px; font-weight: 600; color: var(--text-soft); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 4px; }
  .field-box-value { font-size: 12px; font-weight: 600; color: var(--text); }

  /* TIMELINE */
  .timeline-bar { background: var(--white); border-radius: var(--radius); padding: 14px 16px; margin-bottom: 16px; box-shadow: 0 1px 3px rgba(0,0,0,.06); }
  .timeline-bar-title { font-family: 'Oswald',sans-serif; font-size: 12px; font-weight: 600; color: var(--text-soft); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 10px; }
  .timeline-track { display: flex; height: 28px; border-radius: 6px; overflow: hidden; gap: 2px; }
  .timeline-seg { display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; color: white; min-width: 0; overflow: hidden; white-space: nowrap; transition: opacity .15s; }
  .timeline-seg:hover { opacity: .85; }
  .timeline-labels { display: flex; margin-top: 6px; font-size: 10px; color: var(--text-soft); }
  .timeline-label { text-align: center; }

  /* BLOCKS */
  .block { background: var(--white); border-radius: var(--radius); margin-bottom: 12px; box-shadow: 0 1px 3px rgba(0,0,0,.06); overflow: hidden; }
  .block-header { display: flex; align-items: center; gap: 10px; padding: 12px 16px; cursor: pointer; user-select: none; }
  .block-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .block-name { font-family: 'Oswald',sans-serif; font-size: 15px; font-weight: 600; text-transform: uppercase; letter-spacing: .05em; flex: 1; }
  .block-time-range { font-size: 12px; color: var(--pitch); font-weight: 600; background: var(--accent); padding: 2px 8px; border-radius: 20px; }
  .block-duration { font-size: 12px; color: var(--text-soft); }
  .block-toggle { color: var(--text-soft); transition: transform .2s; font-size: 12px; }
  .block.collapsed .block-toggle { transform: rotate(-90deg); }
  .block-aufwaermen .block-dot { background: var(--block-aufwaermen); }
  .block-spielen1   .block-dot { background: var(--block-spielen1); }
  .block-ueben      .block-dot { background: var(--block-ueben); }
  .block-spielen2   .block-dot { background: var(--block-spielen2); }
  .block-pause      .block-dot { background: var(--block-pause); }
  .block-abschluss  .block-dot { background: #6b7280; }
  .block-content { padding: 0 16px 16px; }
  .block.collapsed .block-content { display: none; }

  /* TIMESLOTS */
  .timeslot { margin-bottom: 12px; }
  .timeslot-time { font-size: 11px; font-weight: 700; color: var(--pitch); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 6px; display: flex; align-items: center; gap: 8px; }
  .timeslot-clock { font-size: 11px; color: var(--text-soft); font-weight: 400; }
  .timeslot-time::after { content: ''; flex: 1; height: 1px; background: var(--mist-dark); }
  .platz-grid { display: grid; gap: 6px; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); }
  .platz-cell { background: var(--mist); border-radius: var(--radius-sm); padding: 10px 12px; min-height: 60px; }
  .platz-cell.has-drill { cursor: pointer; transition: background .15s; }
  .platz-cell.has-drill:hover { background: var(--accent); }
  .platz-label { font-size: 10px; font-weight: 700; color: var(--text-soft); text-transform: uppercase; letter-spacing: .07em; margin-bottom: 4px; }
  .platz-drill { font-size: 13px; font-weight: 600; color: var(--text); line-height: 1.3; }
  .platz-drill.has-link { color: var(--pitch); }
  .platz-trainer { font-size: 11px; color: var(--text-soft); margin-top: 3px; }
  .platz-link-badge { display: inline-flex; align-items: center; gap: 3px; font-size: 10px; color: var(--pitch); margin-top: 2px; }
  .platz-empty { font-size: 12px; color: var(--mist-dark); font-style: italic; }
  .erlaeuterung { margin-top: 8px; padding: 8px 12px; background: #f8f9fb; border-radius: var(--radius-sm); font-size: 12px; color: var(--text-soft); border-left: 2px solid var(--mist-dark); line-height: 1.5; }

  /* DRILL MODAL */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 200; align-items: flex-end; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--white); border-radius: var(--radius) var(--radius) 0 0; padding: 24px; width: 100%; max-width: 600px; max-height: 90vh; overflow-y: auto; animation: slideUp .2s ease; position: relative; }
  @keyframes slideUp { from { transform: translateY(40px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  .modal-handle { width: 36px; height: 4px; background: var(--mist-dark); border-radius: 2px; margin: 0 auto 20px; }
  .modal-drill-name { font-family: 'Oswald',sans-serif; font-size: 22px; font-weight: 700; color: var(--slate); margin-bottom: 6px; }
  .modal-meta { display: flex; gap: 12px; font-size: 12px; color: var(--text-soft); margin-bottom: 16px; flex-wrap: wrap; }
  .modal-desc { font-size: 14px; line-height: 1.6; color: var(--text); margin-bottom: 20px; white-space: pre-wrap; }
  .modal-btn-video { display: flex; align-items: center; justify-content: center; gap: 8px; width: 100%; background: var(--pitch); color: var(--white); border: none; padding: 14px; border-radius: var(--radius-sm); font-family: 'Inter',sans-serif; font-size: 15px; font-weight: 600; cursor: pointer; text-decoration: none; transition: background .15s; }
  .modal-btn-video:hover { background: var(--pitch-dim); }
  .modal-close { position: absolute; top: 16px; right: 16px; background: var(--mist); border: none; width: 32px; height: 32px; border-radius: 50%; font-size: 18px; cursor: pointer; color: var(--text-soft); display: flex; align-items: center; justify-content: center; }

  /* EDITOR */
  .editor-modal .modal { border-radius: var(--radius); max-height: 95vh; }
  .editor-section { background: var(--white); border-radius: var(--radius); padding: 18px; margin-bottom: 10px; box-shadow: 0 1px 3px rgba(0,0,0,.06); }
  .editor-section-title { font-family: 'Oswald',sans-serif; font-size: 13px; font-weight: 600; color: var(--text-soft); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
  .form-row.single { grid-template-columns: 1fr; }
  .form-row.triple { grid-template-columns: 1fr 1fr 1fr; }
  .form-group { display: flex; flex-direction: column; }
  label { display: block; font-size: 11px; font-weight: 600; color: var(--text-soft); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 4px; }
  input[type=text], input[type=date], input[type=number], input[type=url], textarea, select { width: 100%; background: var(--mist); border: 1px solid var(--mist-dark); border-radius: var(--radius-sm); padding: 8px 10px; font-family: 'Inter',sans-serif; font-size: 13px; color: var(--text); outline: none; transition: border-color .15s; }
  input:focus, textarea:focus, select:focus { border-color: var(--pitch); background: white; }
  textarea { resize: vertical; min-height: 56px; }

  /* AUTOCOMPLETE */
  .autocomplete-wrap { position: relative; }
  .autocomplete-list { position: absolute; top: 100%; left: 0; right: 0; background: white; border: 1px solid var(--mist-dark); border-radius: var(--radius-sm); box-shadow: 0 8px 24px rgba(0,0,0,.12); z-index: 300; max-height: 240px; overflow-y: auto; }
  .autocomplete-item { padding: 9px 12px; cursor: pointer; display: flex; flex-direction: column; gap: 2px; border-bottom: 1px solid var(--mist); }
  .autocomplete-item:last-child { border-bottom: none; }
  .autocomplete-item:hover, .autocomplete-item.active { background: var(--accent); }
  .ac-name { font-size: 13px; font-weight: 600; color: var(--text); }
  .ac-cat { font-size: 11px; color: var(--text-soft); }
  .ac-url { font-size: 10px; color: var(--pitch); }

  /* SLOT EDITOR */
  .timeslot-editor { border: 1px solid var(--mist-dark); border-radius: var(--radius-sm); padding: 12px; margin-bottom: 10px; }
  .timeslot-editor-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
  .timeslot-editor-title { font-size: 12px; font-weight: 600; color: var(--text-soft); text-transform: uppercase; letter-spacing: .05em; }
  .slot-time-display { font-size: 12px; color: var(--pitch); font-weight: 600; }
  .btn-remove { background: none; border: none; color: #ef4444; cursor: pointer; font-size: 16px; padding: 2px 6px; border-radius: 4px; }
  .btn-remove:hover { background: #fef2f2; }
  .btn-add-slot { background: var(--mist); border: 1px dashed var(--mist-dark); color: var(--text-soft); width: 100%; padding: 9px; border-radius: var(--radius-sm); font-family: 'Inter',sans-serif; font-size: 13px; cursor: pointer; transition: all .15s; display: flex; align-items: center; justify-content: center; gap: 6px; margin-top: 4px; }
  .btn-add-slot:hover { border-color: var(--pitch); color: var(--pitch); }
  .drill-block { background: var(--mist); border-radius: var(--radius-sm); padding: 10px; margin-bottom: 8px; }
  .drill-block-label { font-size: 11px; font-weight: 700; color: var(--text-soft); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 6px; }
  .editor-actions { display: flex; gap: 10px; margin-top: 16px; padding-bottom: 8px; }

  /* STATS */
  .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 10px; margin-bottom: 16px; }
  .stat-card { background: var(--white); border-radius: var(--radius); padding: 16px; text-align: center; box-shadow: 0 1px 3px rgba(0,0,0,.06); }
  .stat-val { font-family: 'Oswald',sans-serif; font-size: 32px; font-weight: 700; color: var(--pitch); }
  .stat-lbl { font-size: 11px; color: var(--text-soft); text-transform: uppercase; letter-spacing: .05em; margin-top: 4px; }
  .drill-freq-list { background: var(--white); border-radius: var(--radius); overflow: hidden; box-shadow: 0 1px 3px rgba(0,0,0,.06); }
  .drill-freq-item { display: flex; align-items: center; gap: 12px; padding: 11px 16px; border-bottom: 1px solid var(--mist); }
  .drill-freq-item:last-child { border-bottom: none; }
  .drill-freq-rank { font-family: 'Oswald',sans-serif; font-size: 16px; font-weight: 700; color: var(--text-soft); min-width: 22px; }
  .drill-freq-name { flex: 1; font-size: 13px; font-weight: 500; }
  .drill-freq-bar-wrap { width: 70px; height: 6px; background: var(--mist); border-radius: 3px; }
  .drill-freq-bar { height: 100%; background: var(--pitch); border-radius: 3px; }
  .drill-freq-count { font-size: 12px; font-weight: 600; color: var(--text-soft); min-width: 28px; text-align: right; }

  /* LIBRARY */
  .library-search { display: flex; gap: 8px; margin-bottom: 12px; }
  .library-search input { flex: 1; }
  .library-item { background: var(--white); border-radius: var(--radius); padding: 14px 16px; margin-bottom: 8px; box-shadow: 0 1px 3px rgba(0,0,0,.06); display: flex; align-items: center; gap: 12px; cursor: pointer; transition: box-shadow .15s; }
  .library-item:hover { box-shadow: 0 3px 10px rgba(0,0,0,.1); }
  .library-item-name { font-size: 14px; font-weight: 600; flex: 1; }
  .library-item-cat { font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 20px; text-transform: uppercase; white-space: nowrap; }
  .cat-aufwaermen { background: #fef3c7; color: #92400e; }
  .cat-spielform  { background: #dbeafe; color: #1e40af; }
  .cat-technik    { background: #ede9fe; color: #5b21b6; }
  .cat-1v1        { background: #fce7f3; color: #9d174d; }
  .cat-sonstiges  { background: var(--mist); color: var(--text-soft); }
  .library-item-link { color: var(--pitch); font-size: 18px; }

  /* FIELD EDITOR */
  .field-editor-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
  .field-editor-row input { flex: 1; }
  .field-order { font-size: 12px; color: var(--text-soft); min-width: 20px; font-weight: 600; }

  @media (max-width: 480px) {
    .plan-stats { justify-content: flex-start; }
    .form-row { grid-template-columns: 1fr; }
    .form-row.triple { grid-template-columns: 1fr 1fr; }
  }

  /* GROUP BAR */
  .group-bar { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:14px; align-items:center; }
  .group-pill { border:1.5px solid; border-radius:var(--radius); padding:8px 14px; display:flex; flex-direction:column; gap:2px; min-width:110px; background:var(--white); }
  .group-pill-label { font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.06em; }
  .group-pill-count { font-size:14px; font-weight:600; color:var(--text); }
  .group-pill-count.warn { color:#f59e0b; }
  .group-warn { font-size:12px; color:#92400e; background:#fef3c7; padding:6px 12px; border-radius:var(--radius-sm); }

  /* BLOCK V2 */
  .block-v2 { border-radius:var(--radius); margin-bottom:14px; box-shadow:0 2px 6px rgba(0,0,0,.08); overflow:hidden; border-left:5px solid #ccc; }
  .block-v2.collapsed .block-v2-body { display:none; }
  .block-v2-header { display:flex; align-items:center; gap:10px; padding:13px 16px; cursor:pointer; user-select:none; }
  .block-v2-dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }
  .block-v2-name { font-family:'Oswald',sans-serif; font-size:16px; font-weight:700; text-transform:uppercase; letter-spacing:.06em; flex:1; }
  .block-v2-time { font-size:12px; font-weight:700; padding:3px 10px; border-radius:20px; }
  .block-v2-dur { font-size:12px; margin-left:4px; }
  .block-v2-toggle { font-size:12px; transition:transform .2s; }
  .block-v2.collapsed .block-v2-toggle { transform:rotate(-90deg); }
  /* Block type colors */
  .bv2-aufwaermen { border-left-color:#f59e0b; }
  .bv2-aufwaermen .block-v2-header { background:#fffbeb; }
  .bv2-aufwaermen .block-v2-name { color:#92400e; }
  .bv2-aufwaermen .block-v2-time { background:#fef3c7; color:#92400e; }
  .bv2-aufwaermen .block-v2-dur { color:#b45309; }
  .bv2-aufwaermen .block-v2-toggle { color:#b45309; }
  .bv2-spielen1 { border-left-color:#3b82f6; }
  .bv2-spielen1 .block-v2-header { background:#eff6ff; }
  .bv2-spielen1 .block-v2-name { color:#1e40af; }
  .bv2-spielen1 .block-v2-time { background:#dbeafe; color:#1e40af; }
  .bv2-spielen1 .block-v2-dur { color:#1d4ed8; }
  .bv2-spielen1 .block-v2-toggle { color:#1d4ed8; }
  .bv2-ueben { border-left-color:#8b5cf6; }
  .bv2-ueben .block-v2-header { background:#f5f3ff; }
  .bv2-ueben .block-v2-name { color:#5b21b6; }
  .bv2-ueben .block-v2-time { background:#ede9fe; color:#5b21b6; }
  .bv2-ueben .block-v2-dur { color:#6d28d9; }
  .bv2-ueben .block-v2-toggle { color:#6d28d9; }
  .bv2-spielen2 { border-left-color:#10b981; }

// ─── TIME HELPERS ─────────────────────────────────────────
function timeToMin(t) {
  const [h,m] = t.split(':').map(Number);
  return h * 60 + m;
}
function minToTime(m) {
  const h = Math.floor(m / 60);
  const mm = m % 60;
  return String(h).padStart(2,'0') + ':' + String(mm).padStart(2,'0');
}

function isRotation(sl) {
  return sl.rotation === true;
}

function slotRealDuration(sl, numPlaetze) {
  if (isRotation(sl)) {
    const filled = (sl.plaetze || []).filter(p => p && p.name && p.name.trim()).length;
    return (sl.dauer || 0) * Math.max(filled, 1);
  }
  return sl.dauer || 0;
}

function calcSlotTimes(session) {
  let cursor = timeToMin(sessionStart(session));
  const numPlaetze = session.aufbau ? session.aufbau.length : 3;
  const result = [];
  session.bloecke.forEach(b => {
    const bSlots = [];
    b.slots.forEach(sl => {
      const start = cursor;
      const realDur = slotRealDuration(sl, numPlaetze);
      const end = cursor + realDur;
      bSlots.push({ start: minToTime(start), end: minToTime(end), isRotation: isRotation(sl), realDuration: realDur });
      cursor = end;
    });
    result.push(bSlots);
  });
  return result;
}

function calcTotalMin(s) {
  const numPlaetze = s.aufbau ? s.aufbau.length : 3;
  return s.bloecke.reduce((sum,b) => sum + b.slots.reduce((s2,sl) => s2 + slotRealDuration(sl, numPlaetze), 0), 0);
}

function switchView(view, btn) {
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  if (btn) btn.classList.add('active');
  ['list','plan','stats','library'].forEach(v => {
    document.getElementById('view-'+v).classList.toggle('active', v===view);
  });
  if (view==='stats') renderStats();
  if (view==='library') renderLibrary();
  if (view==='list') renderSessionList();
}
function resetFilter() {
  _filter = { mannschaft: '', trainer: '', monat: '' };

function renderSessionList() {
  const data = _cache;
  const el = document.getElementById('session-list');

  // Populate filter dropdowns
  const allMannschaften = [...new Set(data.sessions.map(s=>s.mannschaft).filter(Boolean))].sort();
  const allTrainer = [...new Set(data.sessions.flatMap(s=>s.trainerListe||[]).filter(Boolean))].sort();
  const mannEl = document.getElementById('filter-mann');
  const trainerEl = document.getElementById('filter-trainer');
  if (mannEl) {
    const curMann = mannEl.value;
    mannEl.innerHTML = '<option value="">Alle Mannschaften</option>' +
      allMannschaften.map(m=>`<option value="${m}" ${m===curMann?'selected':''}>${m}</option>`).join('');
  }
  if (trainerEl) {
    const curTrainer = trainerEl.value;
    trainerEl.innerHTML = '<option value="">Alle Trainer</option>' +
      allTrainer.map(t=>`<option value="${t}" ${t===curTrainer?'selected':''}>${t}</option>`).join('');
  }

  // Apply filters
  let sessions = [...data.sessions];
  if (_filter.mannschaft) sessions = sessions.filter(s => s.mannschaft === _filter.mannschaft);
  if (_filter.trainer) sessions = sessions.filter(s => (s.trainerListe||[]).includes(_filter.trainer));
  if (_filter.monat) sessions = sessions.filter(s => s.datum && s.datum.startsWith(_filter.monat));

  if (!sessions.length) {
    el.innerHTML = `<div class="empty-state"><div class="empty-icon">🔍</div><h3>Keine Einheiten gefunden</h3><p>Filter anpassen oder zurücksetzen.</p></div>`;
    return;
  }
  const sorted = [...sessions].sort((a,b) => b.datum.localeCompare(a.datum));
  el.innerHTML = sorted.map(s => {
    const d = new Date(s.datum+'T12:00:00');
    const dateStr = d.toLocaleDateString('de-DE',{weekday:'long',day:'2-digit',month:'long',year:'numeric'});
    const total = calcTotalMin(s);
    const tc = teamColor(s.mannschaft);
    return `<div class="session-card" onclick="openSession('${s.id}')" style="border-left-color:${tc.border};">
      <div style="flex:1;">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;">
          <span style="background:${tc.bg};color:${tc.text};font-size:12px;font-weight:700;padding:3px 10px;border-radius:20px;letter-spacing:.04em;">${s.mannschaft||'–'}</span>
          <div class="session-date">${dateStr}</div>
        </div>
        <div class="session-meta">
          <span>👥 ${s.spieler} Spieler</span>
          <span>🧑‍🏫 ${s.trainer} Trainer</span>
          <span>⏱ ${s.startzeit||'17:15'}–${s.endzeit||'18:30'}</span>
        </div>
      </div>
      <div class="session-arrow">›</div>
    </div>`;

  }).join('');
}

function calcGroups(spieler, numGruppen) {
  const n = parseInt(String(spieler).split(/[-–]/)[0]) || 18;
  const ng = numGruppen !== undefined ? numGruppen : 3;
  if (ng === 0) return { total: n, groups: [], warning: false };
  if (ng === 1) return { total: n, groups: [n], warning: n % 2 !== 0 };
  const perGroup = Math.floor(n / ng);
  const remainder = n % ng;
  const groups = Array(ng).fill(perGroup);
  for (let i = 0; i < remainder; i++) groups[i]++;
  return { total: n, groups, warning: groups.some(g => g % 2 !== 0) };
}

function groupLabel(i, s) {
  const name = s && s.gruppenNamen && s.gruppenNamen[i];
  if (name && name.trim()) return name.trim();
  return ['A','B','C','D','E','F'][i] || String(i+1);
}
const GROUP_COLORS = ['#ef4444','#3b82f6','#22c55e','#f59e0b','#8b5cf6','#ec4899'];
const TEAM_COLORS = {
  'F2':      { bg: '#dbeafe', text: '#1e40af', border: '#3b82f6' },

  'D1':      { bg: '#fee2e2', text: '#991b1b', border: '#ef4444' },
};
function teamColor(mann) {
  const key = Object.keys(TEAM_COLORS).find(k => mann && mann.includes(k));
  return key ? TEAM_COLORS[key] : { bg: '#f3f4f6', text: '#374151', border: '#9ca3af' };
}

function renderPlan(s) {
  const d = new Date(s.datum+'T12:00:00');
  const dateStr = d.toLocaleDateString('de-DE',{weekday:'long',day:'2-digit',month:'long',year:'numeric'});
  const slotTimes = calcSlotTimes(s);
  const totalMin = calcTotalMin(s);
  const numPlaetze = s.aufbau ? s.aufbau.length : 3;
  const platzLabels = s.aufbau?.length ? s.aufbau.map(a=>a.platz) : ['Feld 1','Feld 2','Feld 3'];
  const groupInfo = calcGroups(s.spieler, s.numGruppen);
  const totalAvail = timeToMin(sessionEnd(s)) - timeToMin(sessionStart(s));
  const blockColors = {aufwaermen:'#f59e0b',spielen1:'#3b82f6',ueben:'#8b5cf6',spielen2:'#10b981',pause:'#9ca3af',abschluss:'#6b7280'};
  const blockNames  = {aufwaermen:'Aufwärmen',spielen1:'Spielen 1',ueben:'Üben',spielen2:'Spielen 2',pause:'Pause',abschluss:'Abschluss'};

  // Timeline
  let timelineSegs = '';
  s.bloecke.forEach(b => {
    const mins = b.slots.reduce((sum,sl) => sum + slotRealDuration(sl, numPlaetze), 0);
    if (!mins) return;
    const pct = (mins / totalAvail * 100).toFixed(1);
    const col = blockColors[b.typ] || '#9ca3af';
    const label = parseFloat(pct) >= 8 ? blockNames[b.typ] : '';
    timelineSegs += `<div class="timeline-seg" style="flex:${pct};background:${col};" title="${blockNames[b.typ]}: ${mins} Min">${label}</div>`;
  });

  let html = `
    <div class="plan-hero">
      <div>
        <div class="plan-date">${dateStr}</div>
        <div class="plan-team">${s.mannschaft} · ${sessionStart(s)}–${sessionEnd(s)} Uhr</div>
      </div>
      <div class="plan-stats">
        <div><div class="plan-stat-val">${s.spieler}</div><div class="plan-stat-lbl">Spieler</div></div>
        <div><div class="plan-stat-val">${totalMin}'</div><div class="plan-stat-lbl">Minuten</div></div>
        <div><div class="plan-stat-val">${s.trainer}</div><div class="plan-stat-lbl">Trainer</div></div>
      </div>
    </div>`;

  if (s.hinweis) html += `<div class="plan-note">ℹ️ ${s.hinweis}</div>`;

  // Group bar
  const _ng = s.numGruppen !== undefined && s.numGruppen !== null ? s.numGruppen : 3;
  const gNames = Array.from({length: Math.max(_ng, groupInfo.groups.length)}, (_,i) => {
    const n = (s.gruppenNamen||[])[i]||'';
    return n.trim() || (['A','B','C','D','E','F'][i] || String(i+1));
  });
  if (_ng > 0) html += `<div class="group-bar">`;
  groupInfo.groups.forEach((n, i) => {
    const customK = s.gruppenKinder && s.gruppenKinder[i] ? s.gruppenKinder[i] : n;
    const warn = customK % 2 !== 0;
    html += `<div class="group-pill" style="border-color:${GROUP_COLORS[i]};">
      <span class="group-pill-label" style="color:${GROUP_COLORS[i]};">${gNames[i]}</span>
      <span class="group-pill-count${warn?' warn':''}">${customK} Kinder${warn?' ⚠️':''}</span>
    </div>`;
  });
  if (groupInfo.warning) html += `<div class="group-warn">⚠️ Ungerade Kinderzahl – Wechselspieler nötig</div>`;
  if (_ng > 0) html += `</div>`;

  // Timeline
  html += `<div class="timeline-bar">
    <div class="timeline-bar-title">Trainingsablauf · ${sessionStart(s)}–${sessionEnd(s)} Uhr</div>
    <div class="timeline-track">${timelineSegs}</div>
  </div>`;

  // Field setup
  if (s.aufbau?.length) {
    html += `<div class="field-setup">
      <div class="field-setup-title">Aufbau</div>
      <div class="fields-grid">${s.aufbau.map(f => {
        const matItems = (f.material||[]).filter(m=>m.anzahl>0);
        const matHtml = matItems.length
          ? '<div style="margin-top:6px;display:flex;flex-wrap:wrap;gap:4px;">' +
            matItems.map(m=>'<span style="font-size:11px;background:var(--mist-dark);padding:1px 7px;border-radius:20px;">'+m.anzahl+'× '+m.name+'</span>').join('') +
            '</div>'
          : '';
        return '<div class="field-box"><div class="field-box-label">'+f.platz+'</div><div class="field-box-value">'+f.info+'</div>'+matHtml+'</div>';
      }).join('')}</div>
    </div>`;
  }

  // BLOCKS
  s.bloecke.forEach((b, bi) => {
    const bMins = b.slots.reduce((sum,sl) => sum + slotRealDuration(sl, numPlaetze), 0);
    const bStart = slotTimes[bi]?.[0]?.start || '';
    const bEnd   = slotTimes[bi]?.[b.slots.length-1]?.end || '';
    const dotCol = blockColors[b.typ] || '#9ca3af';

    html += `<div class="block-v2 bv2-${b.typ}">
      <div class="block-v2-header" onclick="toggleBlockV2(this)">
        <div class="block-v2-name">${b.name}</div>
        ${bStart ? `<div class="block-v2-time">${bStart}–${bEnd}</div>` : ''}
        <div class="block-v2-dur">${bMins > 0 ? bMins+' Min' : ''}</div>
        <div class="block-v2-toggle">▾</div>
      </div>
      <div class="block-v2-body">`;

    if (b.typ === 'pause' || b.typ === 'abschluss') {
      const st = slotTimes[bi]?.[0];
      html += `<div style="padding:12px 16px;font-size:13px;color:var(--text-soft);">${b.typ==='pause'?'🥤':'👋'} ${b.slots[0]?.dauer||5} Min${st?' · '+st.start+' Uhr':''}</div>`;
      if (b.slots[0]?.erlaeuterung) html += `<div class="erlaeuterung" style="margin:0 16px 12px;">${b.slots[0].erlaeuterung}</div>`;
    } else {
      b.slots.forEach((sl, si) => {
        const st = slotTimes[bi]?.[si];
        const isKlein = sl.kleingruppen;
        const isRot = sl.rotation;
        const realDur = slotRealDuration(sl, numPlaetze);
        const filled = (sl.plaetze||[]).filter(p=>p&&p.name&&p.name.trim()).length;

        // Slot sub-header
        let durLabel = isRot ? `${sl.dauer} Min pro Runde × ${filled} Runden = ${realDur} Min` : `${sl.dauer} Min`;
        // Team info label
        const teamLabel = isRot
          ? `<span class="team-label team-rot">🔄 Alle ${groupInfo.groups.length} Gruppen · nacheinander</span>`
          : isKlein
          ? `<span class="team-label team-klein">👥 Kleingruppen · ${groupInfo.groups.length}× ${groupInfo.groups[0]} Kinder</span>`
          : `<span class="team-label team-all">👨‍👩‍👧‍👦 Ganzes Team · ${groupInfo.total} Kinder</span>`;

        let badge = isRot ? `<span class="slot-badge blue">Gruppen durchlaufen alle Felder</span>`
                  : isKlein ? `<span class="slot-badge green">Kleingruppen parallel</span>` : '';

        html += `<div class="slot-v2">
          <div class="slot-v2-header">
            <span class="slot-v2-time">${durLabel}</span>
            <span class="slot-v2-clock">${st ? st.start+' – '+st.end+' Uhr' : ''}</span>
            ${teamLabel}
            ${badge}
          </div>`;

        // ── FIELD TABLE ──────────────────────────────────────
        // Always render as field-column table
        html += `<div class="field-table-wrap"><table class="field-table">`;

        // Header row: fields
        html += `<thead><tr><th class="ft-time-col"></th>`;
        platzLabels.forEach(lbl => { html += `<th>${lbl}</th>`; });
        html += `</tr></thead><tbody>`;

        // Trainer row
        const hasTrainer = (sl.plaetze||[]).some(p => p?.trainer);
        if (hasTrainer) {
          html += `<tr class="ft-trainer-row"><td class="ft-time-col ft-label">Trainer</td>`;
          platzLabels.forEach((lbl, pi) => {
            const drill = sl.plaetze?.[pi];
            html += `<td><span class="ft-trainer">${drill?.trainer ? '👤 '+drill.trainer : ''}</span></td>`;
          });
          html += `</tr>`;
        }

        // Drill row (shown once, drill stays on field)
        html += `<tr class="ft-drill-row"><td class="ft-time-col ft-label">Übung</td>`;
        platzLabels.forEach((lbl, pi) => {
          const drill = sl.plaetze?.[pi];
          const empty = !drill?.name;
          const drillData = drill?.name ? JSON.stringify({name:drill.name,url:drill.url||'',desc:sl.erlaeuterung||'',platz:lbl,trainer:drill.trainer||''}) : null;
          if (empty) {
            html += `<td><span class="ft-empty">–</span></td>`;
          } else {
            const übungen = (drill.übungen && drill.übungen.filter(u=>u.name)) || [{name:drill.name,url:drill.url||'',dauer:''}];
            html += `<td>${übungen.map(ue => {
              const dd = JSON.stringify({name:ue.name,url:ue.url||drill.url||'',desc:sl.erlaeuterung||'',platz:lbl,trainer:drill.trainer||''});
              return `<div class="ft-drill${ue.url||drill.url?' has-link':''}" onclick='openDrillModal(${JSON.stringify(dd)})'>
                <div class="ft-drill-name">${ue.name}${ue.dauer?' <span style="font-size:10px;color:var(--text-soft);font-weight:400;">(${ue.dauer} Min)</span>':''}</div>
                ${ue.url||drill.url ? '<div class="ft-drill-video">▶ Video</div>' : ''}
              </div>`;
            }).join('<div style="height:4px;"></div>')}</td>`;
          }
        });
        html += `</tr>`;

        // Group rows: one per round (if rotation) or one static row
        if (isRot && filled >= 2) {
          // Only rotate across fields that have a drill
          const filledIndices = platzLabels.map((lbl,pi) => pi).filter(pi => sl.plaetze?.[pi]?.name?.trim());
          const numFilled = filledIndices.length;
          for (let round = 0; round < numFilled; round++) {
            const roundStart = minToTime(timeToMin(st?.start || sessionStart(s)) + round * sl.dauer);
            const roundEnd   = minToTime(timeToMin(st?.start || sessionStart(s)) + (round+1) * sl.dauer);
            html += `<tr class="ft-group-row">`;
            html += `<td class="ft-time-col"><span class="ft-round-time">${roundStart}<br><span style="font-size:10px;color:var(--text-soft);">${roundEnd}</span></span></td>`;
            platzLabels.forEach((lbl, pi) => {
              const hasDrill = !!(sl.plaetze?.[pi]?.name?.trim());
              if (!hasDrill) {
                html += `<td class="ft-empty-cell"><span class="ft-empty">–</span></td>`;
                return;
              }
              // Check for manual override, else use auto rotation
              const filledPos = filledIndices.indexOf(pi);
              const override = sl.groupOverrides?.[round]?.[pi];
              const gLabelsSession = (s.gruppenNamen||['','','']).map((n,i)=>n.trim()||(['A','B','C'][i]||String(i+1)));
              let groupTags = '';
              if (override !== undefined && override !== null) {
                // Multi-group override (e.g. 'ab', 'abc')
                const multi = String(override).match(/^[abc]+$/i) && isNaN(override);
                if (multi) {
                  String(override).split('').forEach(ch => {
                    const gi = ['a','b','c'].indexOf(ch.toLowerCase());
                    if (gi >= 0) {
                      const gc2 = GROUP_COLORS[gi];
                      groupTags += `<span class="ft-group-tag" style="border-color:${gc2};color:${gc2};">${gLabelsSession[gi]}</span>`;
                    }
                  });
                } else {
                  const gi = parseInt(override);
                  const gc2 = GROUP_COLORS[gi % GROUP_COLORS.length];
                  groupTags = `<span class="ft-group-tag" style="border-color:${gc2};color:${gc2};">${gLabelsSession[gi]||groupLabel(gi,s)}</span>`;
                }
              } else {
                const groupIdx = (filledPos - round + numFilled) % numFilled;
                const gc = GROUP_COLORS[groupIdx % GROUP_COLORS.length];
                groupTags = `<span class="ft-group-tag" style="border-color:${gc};color:${gc};">${gLabelsSession[groupIdx]||groupLabel(groupIdx,s)}</span>`;
              }
              html += `<td>
                <div class="ft-groups">${groupTags}</div>
              </td>`;
            });
            html += `</tr>`;
          }
        } else {
          // Single group row – show all groups distributed across fields
          html += `<tr class="ft-group-row"><td class="ft-time-col ft-label">Gruppen</td>`;
          platzLabels.forEach((lbl, pi) => {
            const drill = sl.plaetze?.[pi];
            const empty = !drill?.name;
            // Get manual group assignment or show placeholder
            const assigned = sl.fieldGroups?.[pi];
            html += `<td class="${empty?'ft-empty-cell':''}">`;
            if (!empty) {
              if (assigned && assigned.length) {
                html += `<div class="ft-groups">${assigned.map(gl => {
                  const gc = GROUP_COLORS[['A','B','C'].indexOf(gl)] || '#888';
                  return `<span class="ft-group-tag" style="border-color:${gc};color:${gc};">Gr. ${gl}</span>`;
                }).join('')}</div>`;
              } else {
                html += `<div class="ft-groups ft-groups-empty"><span class="ft-group-hint">Gruppe zuweisen →</span></div>`;
              }
            }
            html += `</td>`;
          });
          html += `</tr>`;
        }

        html += `</tbody></table></div>`;

        if (sl.erlaeuterung) html += `<div class="erlaeuterung" style="margin:0 12px 12px;">${sl.erlaeuterung}</div>`;
        html += `</div>`; // slot-v2
      });
    }
    html += `</div></div>`; // block-v2-body + block-v2
  });

  html += `<div style="margin-top:16px;display:flex;gap:10px;flex-wrap:wrap;" class="print-btn-bar">
    <button class="btn-primary" onclick="printPlan()">🖨️ Als PDF drucken</button>
    <button class="btn-secondary" onclick="shareSession('${s.id}')">🔗 Link teilen</button>
    <button class="btn-secondary" onclick="editSession('${s.id}')">✏️ Bearbeiten</button>
    <button class="btn-secondary" onclick="deleteSession('${s.id}')" style="color:#ef4444;">🗑 Löschen</button>
  </div>`;

  document.getElementById('plan-content').innerHTML = html;
}

function printPlan() {
  // Expand all collapsed blocks before printing
  document.querySelectorAll('.block-v2.collapsed').forEach(b => b.classList.remove('collapsed'));
  // Ensure plan view is visible
  document.querySelectorAll('#view-list,#view-stats,#view-library').forEach(v => v.style.display='none');
  document.getElementById('view-plan').style.display='block';
  setTimeout(() => {
    window.print();
    // Restore after print dialog closes
    window.addEventListener('afterprint', function restoreAfterPrint() {
      document.getElementById('view-list').style.display='';
      document.getElementById('view-stats').style.display='';
      document.getElementById('view-library').style.display='';
      window.removeEventListener('afterprint', restoreAfterPrint);
    });
  }, 150);
}

function toggleBlockV2(h) { h.closest('.block-v2').classList.toggle('collapsed'); }

function openDrillModal(jsonStr) {
  const d = JSON.parse(jsonStr);
  document.getElementById('modal-name').textContent = d.name;
  // Always show catalog description + plan note combined
  const cat = AF_CATALOG.find(e => e.name.toLowerCase()===d.name.toLowerCase());
  const catDesc = cat?.desc || '';
  const planNote = d.desc || '';
  let fullDesc = catDesc;
  if (planNote && planNote !== catDesc) {
    fullDesc = catDesc ? catDesc + '\n\n💡 ' + planNote : planNote;
  }
  document.getElementById('modal-desc').textContent = fullDesc || '–';
  let meta = `<span>📍 ${d.platz}</span>`;
  if (d.trainer) meta += `<span>👤 ${d.trainer}</span>`;
  document.getElementById('modal-meta').innerHTML = meta;
  const btn = document.getElementById('modal-video-btn');
  // Check url_overrides (load async in background if needed)
  const urlOverride = undefined; // overrides loaded separately
  const url = urlOverride !== undefined ? urlOverride : (d.url?.trim() || cat?.url?.trim() || '');
  if (url) { btn.href = url; btn.style.display='flex'; }
  else btn.style.display='none';
  document.getElementById('drill-modal').classList.add('open');
}

async function editDrillUrl() {
  const btn = document.getElementById('modal-video-btn');
  const current = btn.href && btn.href !== window.location.href ? btn.href : '';
  const newUrl = prompt('Video-URL (advance.football):', current);
  if (newUrl === null) return; // cancelled
  const name = document.getElementById('modal-name').textContent;
  // Save to Supabase url_overrides
  try {
    await sbFetch('url_overrides?drill_name=eq.' + encodeURIComponent(name), {
      method: 'DELETE', prefer: 'return=minimal', headers: {}
    }).catch(()=>{});
    if (newUrl.trim()) {
      await sbFetch('url_overrides', {
        method: 'POST',
        body: JSON.stringify({drill_name: name, url: newUrl.trim()}),
        prefer: 'return=minimal'
      });
    }
  } catch(e) { console.error('URL override save failed', e); }
  // Update modal immediately
  if (newUrl.trim()) {
    btn.href = newUrl.trim();
    btn.style.display = 'flex';
  } else {
    btn.style.display = 'none';
  }
  // Also update AF_CATALOG entry if exists
  const cat = AF_CATALOG.find(e => e.name.toLowerCase() === name.toLowerCase());
  if (cat) cat.url = newUrl.trim();
}
function closeDrillModal(e) {
  if (!e || e.target === document.getElementById('drill-modal')) {
    document.getElementById('drill-modal').classList.remove('open');
  }
}

function renderGroupAssignmentEditor(s, sl, bi, si) {
  var filledIdxs = s.aufbau.map(function(_,pi){return pi;}).filter(function(pi){ return sl.plaetze && sl.plaetze[pi] && sl.plaetze[pi].name && sl.plaetze[pi].name.trim(); });
  var numRounds = filledIdxs.length;
  if (numRounds < 2) return '';
  var gruppenNamen = s.gruppenNamen || ['','',''];
  var gLabels = gruppenNamen.map(function(n,i){ return n.trim() || (['A','B','C'][i] || String(i+1)); });
  var html = '';
  html += '<div style="margin:8px 0;padding:10px 12px;background:var(--mist);border-radius:var(--radius-sm);">';
  html += '<div style="font-size:11px;font-weight:700;color:var(--text-soft);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px;">Gruppenverteilung ' + (sl.rotation ? '(Rotation)' : '(Parallel)') + '</div>';
  html += '<table style="width:100%;border-collapse:collapse;font-size:12px;">';
  html += '<thead><tr><th style="text-align:left;padding:4px 8px;color:var(--text-soft);font-size:11px;">Runde</th>';
  filledIdxs.forEach(function(pi) {
    html += '<th style="text-align:left;padding:4px 8px;color:var(--text-soft);font-size:11px;">' + (s.aufbau[pi] ? s.aufbau[pi].platz : 'Feld '+(pi+1)) + '</th>';
  });
  html += '</tr></thead><tbody>';
  for (var round = 0; round < numRounds; round++) {
    html += '<tr><td style="padding:4px 8px;font-size:11px;color:var(--pitch);font-weight:600;">Runde ' + (round+1) + '</td>';
    filledIdxs.forEach(function(pi, filledPos) {
      var autoGroupIdx = (filledPos - round + numRounds) % numRounds;
      var override = sl.groupOverrides && sl.groupOverrides[round] && sl.groupOverrides[round][pi] !== undefined ? sl.groupOverrides[round][pi] : undefined;
      var val = override !== undefined ? override : autoGroupIdx;
      html += '<td style="padding:4px 8px;">';
      html += '<select onchange="setGroupOverride(' + bi + ',' + si + ',' + round + ',' + pi + ',this.value)" style="font-size:12px;padding:3px 6px;border-radius:4px;border:1px solid var(--mist-dark);">';
      gLabels.forEach(function(gl, gi) {
        html += '<option value="' + gi + '"' + (val == gi ? ' selected' : '') + '>' + gl + '</option>';
      });
      html += '<option value="ab"' + (val === 'ab' ? ' selected' : '') + '>A+B</option>';
      html += '<option value="ac"' + (val === 'ac' ? ' selected' : '') + '>A+C</option>';
      html += '<option value="bc"' + (val === 'bc' ? ' selected' : '') + '>B+C</option>';
      html += '<option value="abc"' + (val === 'abc' ? ' selected' : '') + '>A+B+C</option>';
      html += '</select></td>';
    });
    html += '</tr>';
  }
  html += '</tbody></table>';
  html += '<button style="margin-top:8px;font-size:11px;color:var(--text-soft);background:none;border:none;cursor:pointer;text-decoration:underline;" onclick="resetGroupOverrides(' + bi + ',' + si + ')">↺ Automatische Rotation wiederherstellen</button>';
  html += '</div>';
  return html;
}

function renderEditor() {
  const s = editingSession;
  const slotTimes = calcSlotTimes(s);
  const BLOCK_TYPE_OPTIONS = [
    {typ:'aufwaermen',name:'Aufwärmen'},
    {typ:'spielen1',  name:'Spielen 1'},
    {typ:'spielen2',  name:'Spielen 2'},

  // ── Meta ──

    <div class="editor-section-title">Rahmendaten</div>

    </div>
    <div class="form-row">
      <div class="form-group"><label>Spieler</label><input type="text" value="${s.spieler}" oninput="editingSession.spieler=this.value"></div>
    </div>

          <option value="5" ${(s.numGruppen||3)==5?'selected':''}>5 Gruppen</option>
          <option value="6" ${(s.numGruppen||3)==6?'selected':''}>6 Gruppen</option>
        </select>
      </div>
    </div>
    <div class="form-row single">
      <div class="form-group"><label>Gruppen (Namen, leer = A / B / C)</label>
        <div style="display:flex;gap:8px;flex-wrap:wrap;">

function rerenderTimes() {
  // Update only time labels in DOM - no full re-render
  const slotTimes = calcSlotTimes(editingSession);
  editingSession.bloecke.forEach((b, bi) => {
    // Update block header time range
    const bStart = slotTimes[bi]?.[0]?.start || '';
    const bEnd   = slotTimes[bi]?.[b.slots.length-1]?.end || '';
    const bTimeEl = document.getElementById('btime-' + bi);
    if (bTimeEl) bTimeEl.textContent = bStart && bEnd ? bStart + '–' + bEnd : '';

    b.slots.forEach((sl, si) => {
      const st = slotTimes[bi]?.[si];
      if (!st) return;
      const el = document.getElementById('stime-' + bi + '-' + si);
      if (el) el.textContent = st.start + ' – ' + st.end;
      // Update duration label if rotation
      const dlbl = document.getElementById('dlbl-' + bi + '-' + si);
      if (dlbl) {
        const filled = (sl.plaetze||[]).filter(p=>p&&p.name&&p.name.trim()).length;
        dlbl.textContent = st.isRotation
          ? sl.dauer + ' Min × ' + filled + ' Felder = ' + st.realDuration + ' Min'
          : sl.dauer + ' Min';
      }
    });
  });
}

// ─── AUTOCOMPLETE ─────────────────────────────────────────
let acItems = {};
let acIndex = -1;
let acPickingKey = null;

function showAC(input, bi, si, pi, ui) {
  filterAC(input, bi, si, pi, ui||0);
}
function filterAC(input, bi, si, pi, ui) {
  ui = ui||0;
  const key = bi+'-'+si+'-'+pi+'-'+ui;
  const q = input.value.toLowerCase().trim();
  const listEl = document.getElementById('ac-'+key);
  if (!listEl) return;
  if (!q) { listEl.style.display='none'; return; }
  const matches = AF_CATALOG.filter(e => e.name.toLowerCase().includes(q)).slice(0,8);
  const libMatches = (_cache.library||[])
    .filter(e => e.name.toLowerCase().includes(q) && !matches.find(m=>m.name===e.name))
    .slice(0,4)
    .map(e=>({...e, kat:e.kategorie, url:e.url||''}));
  const all = [...matches, ...libMatches];
  acItems[key] = all;
  if (!all.length) { listEl.style.display='none'; return; }
  listEl.innerHTML = all.map((e,i) =>
    '<div class="autocomplete-item" data-idx="'+i+'" onmousedown="acMousedown(\''+key+'\')" onclick="selectAC(\''+key+'\','+i+')">'+
    '<div class="ac-name">'+e.name+'</div>'+
    '<div class="ac-cat">'+(e.kat||'')+' '+(e.url?'· ▶ Video':'')+'</div>'+
    '</div>'
  ).join('');
  listEl.style.display='block';
  acIndex = -1;
}
function acMousedown(key) {
  acPickingKey = key;
}
function hideAC() {
  setTimeout(function() {
    if (acPickingKey) { acPickingKey = null; return; }
    document.querySelectorAll('.autocomplete-list').forEach(function(l){l.style.display='none';});
  }, 200);
}
function selectAC(key, idx) {
  acPickingKey = null;
  var parts = key.split('-').map(Number);
  var bi=parts[0], si=parts[1], pi=parts[2], ui=parts[3]||0;
  var e = acItems[key] && acItems[key][idx];
  if (!e) return;
  setÜbungName(bi,si,pi,ui,e.name);
  if (e.url) setÜbungUrl(bi,si,pi,ui,e.url);
  var nameInput = document.getElementById('name-'+key);
  if (nameInput) nameInput.value = e.name;
  var urlInput = document.getElementById('url-'+key);
  if (urlInput && e.url) urlInput.value = e.url;
  document.getElementById('ac-'+key).style.display='none';
}
function acKeydown(event, input, bi, si, pi, ui) {
  ui = ui||0;
  var key = bi+'-'+si+'-'+pi+'-'+ui;
  var listEl = document.getElementById('ac-'+key);
  if (!listEl || listEl.style.display==='none') { filterAC(input,bi,si,pi); return; }
  var items = listEl.querySelectorAll('.autocomplete-item');
  if (event.key==='ArrowDown') {
    event.preventDefault();
    acIndex = Math.min(acIndex+1, items.length-1);
    items.forEach(function(el,i){ el.classList.toggle('active', i===acIndex); });
  } else if (event.key==='ArrowUp') {
    event.preventDefault();
    acIndex = Math.max(acIndex-1, 0);
    items.forEach(function(el,i){ el.classList.toggle('active', i===acIndex); });
  } else if (event.key==='Enter' && acIndex>=0) {
    event.preventDefault();
    selectAC(key, acIndex);
  } else if (event.key==='Escape') {
    listEl.style.display='none';
  } else {
    filterAC(input, bi, si, pi);
  }
}

function setDrillName(bi,si,pi,val) { ensurePlatz(bi,si,pi); editingSession.bloecke[bi].slots[si].plaetze[pi].name=val; }
function setDrillUrl(bi,si,pi,val)  { ensurePlatz(bi,si,pi); editingSession.bloecke[bi].slots[si].plaetze[pi].url=val; }
function setDrillTrainer(bi,si,pi,val){ ensurePlatz(bi,si,pi); editingSession.bloecke[bi].slots[si].plaetze[pi].trainer=val; }

function toggleGroupAssign(bi, si, pi, group) {
  if (!editingSession.bloecke[bi].slots[si].gruppenZuordnung)
    editingSession.bloecke[bi].slots[si].gruppenZuordnung = {};
  const current = editingSession.bloecke[bi].slots[si].gruppenZuordnung[pi] || [];
  const idx = current.indexOf(group);
  if (idx >= 0) current.splice(idx, 1);
  else current.push(group);
  editingSession.bloecke[bi].slots[si].gruppenZuordnung[pi] = current;
}

function moveBlock(bi, dir) {

// ── ÜBUNG HELPERS ─────────────────────────────────────────
function ensurePlatz(bi,si,pi) {
  const sl = editingSession.bloecke[bi].slots[si];
  if (!sl.plaetze) sl.plaetze = [];
  while (sl.plaetze.length <= pi) sl.plaetze.push(null);
  if (!sl.plaetze[pi]) sl.plaetze[pi] = {name:'',url:'',trainer:'',übungen:[]};
  if (!sl.plaetze[pi].übungen) sl.plaetze[pi].übungen = [{name:sl.plaetze[pi].name||'',url:sl.plaetze[pi].url||'',dauer:''}];
}
function setÜbungName(bi,si,pi,ui,val) {
  ensurePlatz(bi,si,pi);
  const p = editingSession.bloecke[bi].slots[si].plaetze[pi];
  if (!p.übungen[ui]) p.übungen[ui] = {name:'',url:'',dauer:''};
  p.übungen[ui].name = val;
  p.name = p.übungen[0].name; // keep legacy compat
  // filter AC
  const inp = document.getElementById('name-'+bi+'-'+si+'-'+pi+'-'+ui);
  if (inp) filterAC(inp, bi, si, pi, ui);
}
function setÜbungDesc(bi,si,pi,ui,val) {
  ensurePlatz(bi,si,pi);
  const p = editingSession.bloecke[bi].slots[si].plaetze[pi];
  if (!p.übungen[ui]) p.übungen[ui] = {name:'',url:'',dauer:'',desc:''};
  p.übungen[ui].desc = val;
}
function setÜbungUrl(bi,si,pi,ui,val) {
  ensurePlatz(bi,si,pi);
  const p = editingSession.bloecke[bi].slots[si].plaetze[pi];
  if (!p.übungen[ui]) p.übungen[ui] = {name:'',url:'',dauer:''};
  p.übungen[ui].url = val;
  if (ui === 0) p.url = val;
}
function setÜbungDauer(bi,si,pi,ui,val) {
  ensurePlatz(bi,si,pi);
  const p = editingSession.bloecke[bi].slots[si].plaetze[pi];
  if (!p.übungen[ui]) p.übungen[ui] = {name:'',url:'',dauer:''};
  p.übungen[ui].dauer = val;
}
function addÜbung(bi,si,pi) {
  ensurePlatz(bi,si,pi);
  editingSession.bloecke[bi].slots[si].plaetze[pi].übungen.push({name:'',url:'',dauer:''});
  renderEditor();
}
function removeÜbung(bi,si,pi,ui) {
  ensurePlatz(bi,si,pi);
  const üb = editingSession.bloecke[bi].slots[si].plaetze[pi].übungen;
  if (üb.length <= 1) { üb[0] = {name:'',url:'',dauer:''}; }
  else { üb.splice(ui,1); }
  renderEditor();
}

function setGroupOverride(bi, si, round, pi, val) {
  const sl = editingSession.bloecke[bi].slots[si];
  if (!sl.groupOverrides) sl.groupOverrides = {};
  if (!sl.groupOverrides[round]) sl.groupOverrides[round] = {};
  // Store as number if numeric, else as string
  sl.groupOverrides[round][pi] = isNaN(val) ? val : parseInt(val);
}
function resetGroupOverrides(bi, si) {
  editingSession.bloecke[bi].slots[si].groupOverrides = {};

}

function clearDrill(bi,si,pi) {
  ensurePlatz(bi,si,pi);
  editingSession.bloecke[bi].slots[si].plaetze[pi] = {name:'',url:'',trainer:''};

function addSlot(bi) {
  const numP = editingSession.aufbau.length;
  editingSession.bloecke[bi].slots.push({dauer:7, plaetze:Array(numP).fill(null).map(()=>({name:'',url:'',trainer:''})), erlaeuterung:''});

}
function removeSlot(bi,si) { editingSession.bloecke[bi].slots.splice(si,1); renderEditor(); }
function setMaterial(fieldIdx, matName, val) {
  const f = editingSession.aufbau[fieldIdx];
  if (!f.material) f.material = [];
  const entry = f.material.find(e => e.name === matName);
  const anzahl = parseInt(val) || 0;
  if (entry) { entry.anzahl = anzahl; }
  else if (anzahl > 0) { f.material.push({name: matName, anzahl}); }
}

function addField() {

function removeField(i) {

function extractDrillsFromSession(session) {
  // Collect all unique drill names from session that aren't in AF_CATALOG
  const known = new Set(AF_CATALOG.map(e => e.name.toLowerCase()));
  const libNames = new Set((_cache.library||[]).map(e => e.name.toLowerCase()));
  const newDrills = [];
  session.bloecke.forEach(b => b.slots.forEach(sl => {
    (sl.plaetze||[]).forEach(p => {
      if (!p || !p.name) return;
      const übungen = (p.übungen && p.übungen.filter(u=>u.name)) || [{name:p.name,url:p.url||'',desc:''}];
      übungen.forEach(ue => {
        const nm = ue.name.trim();
        if (!nm) return;
        if (!known.has(nm.toLowerCase()) && !libNames.has(nm.toLowerCase())) {
          newDrills.push({ id:'u'+Date.now()+Math.random(), name:nm, url:ue.url||'', kategorie:'sonstiges', beschreibung:ue.desc||'' });
          libNames.add(nm.toLowerCase());
        }
      });
    });
  }));
  return newDrills;
}

async function saveSession() {
  try {
    showLoading(true);
    const row = sessionToRow(editingSession);
    await sbFetch('sessions?id=eq.' + editingSession.id, {
      method: 'DELETE', prefer: 'return=minimal', headers: {}
    }).catch(()=>{});
    await sbFetch('sessions', {
      method: 'POST', body: JSON.stringify(row), prefer: 'return=minimal'
    });
    const idx = _cache.sessions.findIndex(s => s.id === editingSession.id);
    if (idx >= 0) _cache.sessions[idx] = editingSession;
    else _cache.sessions.unshift(editingSession);
    // Auto-save new drills to library
    const newDrills = extractDrillsFromSession(editingSession);
    if (newDrills.length) {
      if (!_cache.library) _cache.library = [];
      _cache.library.push(...newDrills);
      showToast('✓ Gespeichert · ' + newDrills.length + ' neue Übung(en) im Katalog');
    } else {
      showToast('✓ Gespeichert');
    }
    closeEditorModal();
    renderSessionList();
  } catch(e) {
    console.error(e);
    showToast('⚠️ Speichern fehlgeschlagen', 'error');
  } finally { showLoading(false); }
}
function deleteSession(id) { requireAdmin(() => _deleteSession(id)); }
async function _deleteSession(id) {
  if (!confirm('Trainingseinheit wirklich löschen?')) return;
  try {
    await sbFetch('sessions?id=eq.' + id, {
      method: 'DELETE', prefer: 'return=minimal', headers: {}
    });
    _cache.sessions = _cache.sessions.filter(s => s.id !== id);
  saveToLocalStorage(_cache.sessions);
    showToast('✓ Gelöscht');
    backToList();
  } catch(e) {
    showToast('⚠️ Löschen fehlgeschlagen', 'error');
  }
}
function closeEditorModal(e) {
  if (!e || e.target === document.getElementById('editor-modal')) {
    document.getElementById('editor-modal').classList.remove('open');
  }
}

function renderStats() {
  const data = _cache;
  const el = document.getElementById('stats-content');
  if (!data.sessions.length) {
    el.innerHTML=`<div class="empty-state"><div class="empty-icon">📊</div><h3>Noch keine Daten</h3></div>`;
    return;
  }
  const drillCount={}, trainerCount={};
  let totalMin=0;
  data.sessions.forEach(s => {
    totalMin+=calcTotalMin(s);
    s.bloecke.forEach(b=>b.slots.forEach(sl=>{
      if(sl.plaetze) sl.plaetze.forEach(p=>{
        if(p?.name){ drillCount[p.name]=(drillCount[p.name]||0)+1; }
        if(p?.trainer){ trainerCount[p.trainer]=(trainerCount[p.trainer]||0)+1; }
      });
    }));
  });
  const sorted = Object.entries(drillCount).sort((a,b)=>b[1]-a[1]);
  const maxC = sorted[0]?.[1]||1;
  let html=`<div class="stats-grid">
    <div class="stat-card"><div class="stat-val">${data.sessions.length}</div><div class="stat-lbl">Einheiten</div></div>
    <div class="stat-card"><div class="stat-val">${totalMin}'</div><div class="stat-lbl">Trainingszeit</div></div>
    <div class="stat-card"><div class="stat-val">${sorted.length}</div><div class="stat-lbl">Übungen</div></div>
  </div>
  <div class="section-title" style="margin-bottom:12px;">Häufigste Übungen</div>
  <div class="drill-freq-list">
    ${sorted.slice(0,15).map(([name,count],i)=>`
      <div class="drill-freq-item">
        <div class="drill-freq-rank">${i+1}</div>
        <div class="drill-freq-name">${name}</div>
        <div class="drill-freq-bar-wrap"><div class="drill-freq-bar" style="width:${Math.round(count/maxC*100)}%"></div></div>
        <div class="drill-freq-count">${count}×</div>
      </div>`).join('')}
  </div>`;
  el.innerHTML=html;
}

// ─── LIBRARY ──────────────────────────────────────────────
function renderLibrary() {
  const data = _cache;
  const q=(document.getElementById('library-search-input')?.value||'').toLowerCase();
  const all=[...AF_CATALOG.map(e=>({...e,kategorie:e.kat,beschreibung:e.desc,isBuiltin:true})),...data.library.filter(l=>!AF_CATALOG.find(e=>e.name===l.name))];
  const items=all.filter(l=>!q||l.name.toLowerCase().includes(q));
  const el=document.getElementById('library-list');
  const catLabel={aufwaermen:'Aufwärmen',spielform:'Spielform',technik:'Technik','1v1':'1v1',sonstiges:'Sonstiges'};
  if(!items.length){el.innerHTML=`<div class="empty-state"><div class="empty-icon">📚</div><h3>Keine Übungen gefunden</h3></div>`;return;}
  el.innerHTML=items.map(l=>`
    <div class="library-item" ${l.url?`onclick="window.open('${l.url}','_blank')"`:''}>
      <div style="flex:1;">
        <div class="library-item-name">${l.name}</div>
        <div style="font-size:12px;color:var(--text-soft);margin-top:3px;">${l.beschreibung||l.desc||''}</div>
      </div>
      <div class="library-item-cat cat-${l.kategorie||l.kat||'sonstiges'}">${catLabel[l.kategorie||l.kat]||'Sonstiges'}</div>
      ${l.url?'<div class="library-item-link">▶</div>':''}
    </div>`).join('');
}
function showLibraryEditor() {
  document.getElementById('lib-name').value = '';
  document.getElementById('lib-url').value = '';
  document.getElementById('lib-kat').value = 'spielform';
  document.getElementById('lib-desc').value = '';
  document.getElementById('library-dialog').showModal();
}
function saveLibraryDialog() {
  const name = document.getElementById('lib-name').value.trim();
  if (!name) return;
  const url = document.getElementById('lib-url').value.trim();
  const kategorie = document.getElementById('lib-kat').value;
  const beschreibung = document.getElementById('lib-desc').value.trim();
  if (!_cache.library) _cache.library = [];
  _cache.library.push({id:'l'+Date.now(), name, url, kategorie, beschreibung});
  renderLibrary();
  showToast('✓ Übung gespeichert');
}

// ─── INIT ─────────────────────────────────────────────────
async 
function shareSession(id) {
  const url = window.location.origin + window.location.pathname + '?session=' + id;
  if (navigator.share) {
    navigator.share({ title: 'TSV Trainingsplan', url });
  } else if (navigator.clipboard) {
    navigator.clipboard.writeText(url).then(() => showToast('🔗 Link kopiert'));
  } else {
    prompt('Link kopieren:', url);
  }
}

function checkDeepLink() {
  const params = new URLSearchParams(window.location.search);
  const sessionId = params.get('session');
  if (sessionId) {
    loadData().then(() => {
      const s = _cache.sessions.find(x => x.id === sessionId);
      if (s) { renderPlan(s); switchView('plan', null); }
      else showToast('⚠️ Einheit nicht gefunden', 'error');
    });
  }
}

async function exportBackup() {
  try {
    const [sessions, urlOverrides] = await Promise.all([
      sbFetch('sessions?order=datum.desc&limit=10000'),
      sbFetch('url_overrides?limit=10000')
    ]);
    const backup = {
      exportedAt: new Date().toISOString(),
      version: 1,
      sessions,
      url_overrides: urlOverrides
    };
    const blob = new Blob([JSON.stringify(backup, null, 2)], {type: 'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    const date = new Date().toISOString().slice(0,10);
    a.href = url;
    a.download = 'TSV-Trainingsplaner-Backup-' + date + '.json';
    a.click();
    URL.revokeObjectURL(url);
    showToast('💾 Backup heruntergeladen');
  } catch(e) {
    showToast('⚠️ Backup fehlgeschlagen: ' + e.message, 'error');
  }
}

document.addEventListener('DOMContentLoaded', function() {
  const pwInput = document.getElementById('pw-input');
  if (pwInput) pwInput.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') submitPwDialog();
  });
});

async function init() {
  // 1. Show from localStorage immediately – no waiting
  const cached = loadFromLocalStorage();
  if (cached && cached.length > 0) {
    _cache.sessions = cached;
    _cache.loaded = true;
    renderSessionList();
  }

  // 2. Fetch fresh from Supabase in background
  try {
    showLoading(true);
    const rows = await sbFetch('sessions?order=datum.desc');
    const fresh = (rows||[]).map(rowToSession);
    if (fresh.length === 0 && _cache.sessions.length === 0) {
      await seedIfEmpty();
    }
    if (JSON.stringify(fresh) !== JSON.stringify(_cache.sessions)) {
      _cache.sessions = fresh;
      saveToLocalStorage(fresh);
    } else {
      saveToLocalStorage(fresh);
    }
    _cache.loaded = true;
  } catch(e) {
    console.error(e);
    if (!cached || cached.length === 0) showToast('⚠️ Verbindungsfehler', 'error');
  } finally {
    showLoading(false);
  }

  // 3. Always render after Supabase load (covers first visit)
  renderSessionList();
  checkDeepLink();
}
init();
</script>
